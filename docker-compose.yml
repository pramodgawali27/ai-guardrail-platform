version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: guardrail-postgres
    environment:
      POSTGRES_DB: guardrail_db
      POSTGRES_USER: guardrail
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardrail -d guardrail_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: guardrail-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  guardrail-api:
    build:
      context: .
      dockerfile: src/Guardrail.API/Dockerfile
    container_name: guardrail-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=guardrail_db;Username=guardrail;Password=dev_password
      ConnectionStrings__Redis: redis:6379
      Auth__DisableAuth: "true"
      Guardrail__SeedDataOnStartup: "true"
      Guardrail__ApplyDatabaseOnStartup: "true"
      Guardrail__PolicySeedPath: /app/policies/samples
      Guardrail__EvaluationSeedPath: /app/evaluations/datasets
    ports:
      - "8080:8080"
    volumes:
      - ./policies:/app/policies
      - ./evaluations:/app/evaluations

volumes:
  postgres-data:
  redis-data:
