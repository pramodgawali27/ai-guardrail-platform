apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: guardrail-postgres
spec:
  serviceName: guardrail-postgres
  replicas: 1
  selector:
    matchLabels:
      app: guardrail-postgres
  template:
    metadata:
      labels:
        app: guardrail-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: guardrail_db
            - name: POSTGRES_USER
              value: guardrail
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: guardrail-secrets
                  key: postgres-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: guardrail-postgres
spec:
  selector:
    app: guardrail-postgres
  ports:
    - port: 5432
      targetPort: 5432
