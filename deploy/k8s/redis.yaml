apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrail-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guardrail-redis
  template:
    metadata:
      labels:
        app: guardrail-redis
    spec:
      containers:
        - name: redis
          image: redis:7
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: guardrail-redis
spec:
  selector:
    app: guardrail-redis
  ports:
    - port: 6379
      targetPort: 6379
